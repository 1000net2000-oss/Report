<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0f0f12">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content=" ">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <title>Отчёт о работе</title>
</head>
<body>

<!-- ══ MAIN PAGE ══ -->
<div class="page active" id="pageMain">

  <header>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div class="header-title" style="margin-bottom:0">Отчёт о работе</div>
      <div style="display:flex;gap:8px">
        <button onclick="backupData()" style="background:#1e3a2e;border:none;color:#6ee7b7;font-size:11px;padding:6px 10px;border-radius:8px;cursor:pointer;font-family:Inter,sans-serif">💾 Бэкап</button>
        <label style="background:#1e1e3a;border:none;color:#818cf8;font-size:11px;padding:6px 10px;border-radius:8px;cursor:pointer;font-family:Inter,sans-serif">
          📂 Загрузить
          <input type="file" accept=".json" onchange="restoreData(event)" style="display:none">
        </label>
      </div>
    </div>
    <div class="month-selector">
      <button class="month-btn" onclick="changeMonth(-1)">‹</button>
      <div class="month-label" id="monthLabel"></div>
      <button class="month-btn" onclick="changeMonth(1)">›</button>
    </div>
  </header>

  <div class="totals-bar">
    <div class="mob-total">
      <div class="total-label">Мобильная</div>
      <div class="total-val" id="totalMob">0</div>
    </div>
    <button class="mob-total" onclick="openHistory('work')" style="cursor:pointer;border:none;text-align:left">
      <div class="total-label">Другие работы</div>
      <div class="total-val" id="totalExtraWork" style="color:var(--orange)">0</div>
    </button>
    <div class="total-card">
      <div class="total-label">Обычные</div>
      <div class="total-row">
        <span class="total-name">Было в сушилке</span>
        <input class="card-input" type="number" min="0" id="wasNormal" value="0" oninput="saveWas();updateTotals()" onchange="saveWas();updateTotals()">
      </div>
      <div class="total-row"><span class="total-name">Забрал</span><span class="total-val" id="totalSush">0</span></div>
      <div class="total-row"><span class="total-name">Отдал</span><span class="total-val" id="totalSklad">0</span></div>
      <div class="net-row">
        <span class="net-label">В сушилке</span>
        <span class="net-val" id="totalSushNet">0</span>
      </div>
    </div>
    <div class="total-card">
      <div class="total-label">Минибар</div>
      <div class="total-row">
        <span class="total-name">Было в сушилке</span>
        <input class="card-input" type="number" min="0" id="wasMb" value="0" oninput="saveWas();updateTotals()" onchange="saveWas();updateTotals()">
      </div>
      <div class="total-row"><span class="total-name">Забрал</span><span class="total-val" id="totalMbSush">0</span></div>
      <div class="total-row"><span class="total-name">Отдал</span><span class="total-val" id="totalMbSklad">0</span></div>
      <div class="net-row">
        <span class="net-label">В сушилке</span>
        <span class="net-val" id="totalMbNet">0</span>
      </div>
    </div>
  </div>

  <div class="extra-totals">
    <button class="extra-total-btn travel" onclick="openHistory('travel')">
      <div class="extra-total-lbl">Время в пути</div>
      <div class="extra-total-val" id="totalExtraTravel">0 мин</div>
    </button>
  </div>

  <div class="days-list" id="daysList"></div>

</div><!-- /pageMain -->

<!-- ══ HISTORY PAGE ══ -->
<div class="page" id="pageHistory">
  <div class="hist-header">
    <button class="back-btn" onclick="openMain()">←</button>
    <div class="hist-title" id="histTitle" style="color:var(--orange)">История</div>
  </div>
  <div class="hist-tabs">
    <button class="hist-tab on" id="tabWork" onclick="switchTab('work')">📋 Другие работы</button>
    <button class="hist-tab" id="tabTravel" onclick="switchTab('travel')">🚗 В пути</button>
  </div>
  <div class="hist-content" id="histContent"></div>
</div>

<script src="app.js"></script>
</body>
</html>
