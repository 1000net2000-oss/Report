<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0f0f12">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content=" ">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <title>Отчёт о работе</title>
</head>
<body>

<!-- ══ MAIN PAGE ══ -->
<div class="page active" id="pageMain">

  <header>
    <div class="header-top">
      <div class="lang-switcher">
        <button class="flag-btn" id="flagRu" onclick="setLang('ru')">🏳️</button>
        <button class="flag-btn" id="flagPl" onclick="setLang('pl')">🇵🇱</button>
      </div>
      <div class="header-actions">
        <button id="btnBackup" class="hdr-btn green" onclick="backupData()">💾 Бэкап</button>
        <label id="btnRestore" class="hdr-btn purple">
          <span id="btnRestoreLbl">📂 Загрузить</span>
          <input type="file" accept=".json" onchange="restoreData(event)" class="hidden-input">
        </label>
      </div>
    </div>
    <div class="month-selector">
      <button class="month-btn" onclick="changeMonth(-1)">‹</button>
      <div class="month-label" id="monthLabel"></div>
      <button class="month-btn" onclick="changeMonth(1)">›</button>
    </div>
  </header>

  <div class="totals-bar">
    <div class="mob-total">
      <div class="total-label" id="labelMob">Мобильная</div>
      <div class="total-val" id="totalMob">0</div>
    </div>
    <button class="mob-total mob-total--btn" onclick="openHistory('work')">
      <div class="total-label" id="labelOtherWork">Другие работы</div>
      <div class="total-val total-val--orange" id="totalExtraWork">0</div>
    </button>
    <div class="total-card">
      <div class="total-label" id="labelRegular">Обычные</div>
      <div class="total-row"><span class="total-name" id="labelRegTook">Забрал</span><span class="total-val" id="totalSush">0</span></div>
      <div class="total-row"><span class="total-name" id="labelRegGave">Отдал</span><span class="total-val" id="totalSklad">0</span></div>
    </div>
    <div class="total-card">
      <div class="total-label" id="labelMinibar">Минибар</div>
      <div class="total-row"><span class="total-name" id="labelMbTook">Забрал</span><span class="total-val" id="totalMbSush">0</span></div>
      <div class="total-row"><span class="total-name" id="labelMbGave">Отдал</span><span class="total-val" id="totalMbSklad">0</span></div>
    </div>
    <div class="vsego-row">
      <div class="total-label total-label--inline" id="labelTotal">Всего</div>
      <div class="total-val total-val--big total-val--pink" id="totalAll">0</div>
    </div>
    <div class="salary-row" onclick="toggleSalary()">
      <div class="salary-inner">
        <div class="salary-val"><span id="salaryNum" class="salary-hidden">—</span></div>
      </div>
    </div>
  </div>

  <div class="extra-totals single">
    <button class="extra-total-btn travel" onclick="openHistory('travel')">
      <div class="extra-total-lbl" id="labelTravel">Время в пути</div>
      <div class="extra-total-val" id="totalExtraTravel">0 мин</div>
    </button>
  </div>

  <div class="extra-totals double">
    <div class="extra-small-btn">
      <div class="extra-small-lbl" id="labelWarehouse">Склад</div>
      <div><span class="extra-small-val" id="totalSkladDays">0</span><span class="extra-small-days" id="labelWarehouseDays"> дн.</span></div>
    </div>
    <div class="extra-small-btn">
      <div class="extra-small-lbl" id="labelHighway">Трасса</div>
      <div><span class="extra-small-val" id="totalTrassaDays">0</span><span class="extra-small-days" id="labelHighwayDays"> дн.</span></div>
    </div>
  </div>

  <div class="action-btns">
    <button id="btnSummary" class="action-btn summary" onclick="copySummary()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
      <span id="btnSummary-lbl">Поделиться</span>
    </button>
    <button id="btnArchive" class="action-btn archive" onclick="openArchive()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>
      <span id="btnArchive-lbl">Архив</span>
    </button>
    <button id="btnChart" class="action-btn chart" onclick="openChart()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span id="btnChart-lbl">График</span>
    </button>
  </div>

  <div class="days-list" id="daysList"></div>

</div>

<!-- ══ HISTORY PAGE ══ -->
<div class="page" id="pageHistory">
  <div class="hist-header">
    <button class="back-btn" onclick="openMain()">←</button>
    <div class="hist-title hist-title--orange" id="histTitle">История</div>
  </div>
  <div class="hist-tabs">
    <button class="hist-tab on" id="tabWork" onclick="switchTab('work')">📋 Другие работы</button>
    <button class="hist-tab" id="tabTravel" onclick="switchTab('travel')">🚗 В пути</button>
  </div>
  <div class="hist-content" id="histContent"></div>
</div>

<!-- ══ CHART PAGE ══ -->
<div class="page" id="pageChart">
  <div class="hist-header">
    <button class="back-btn" onclick="closeChart()">←</button>
    <div class="hist-title hist-title--accent2" id="chartPageTitle">График</div>
  </div>
  <div class="chart-month-lbl" id="chartMonthLabel"></div>
  <div class="chart-wrap">
    <canvas id="chartCanvas"></canvas>
  </div>
</div>

<!-- ══ ARCHIVE PAGE ══ -->
<div class="page" id="pageArchive">
  <div class="hist-header">
    <button class="back-btn" onclick="closeArchive()">←</button>
    <div class="hist-title hist-title--accent" id="archiveTitle">Архив</div>
  </div>
  <div class="hist-content" id="archiveContent"></div>
</div>

<!-- ══ QUICK INPUT OVERLAY ══ -->
<div class="quick-overlay" id="quickOverlay" onclick="closeQuickInput()">
  <div class="quick-sheet" onclick="event.stopPropagation()">
    <div class="quick-header">
      <div class="quick-title">Быстрый ввод</div>
      <div class="quick-date" id="quickDate"></div>
    </div>
    <div class="quick-fields">
      <div class="quick-field">
        <label>Мобильная</label>
        <input id="quickMob" type="text" inputmode="text" placeholder="0">
      </div>
      <div class="quick-field">
        <label>Стационарная отдал</label>
        <input id="quickSklad" type="text" inputmode="text" placeholder="0">
      </div>
      <div class="quick-field">
        <label>МБ отдал</label>
        <input id="quickMbSklad" type="text" inputmode="text" placeholder="0">
      </div>
    </div>
    <button class="quick-save" onclick="saveQuickInput()">Сохранить</button>
  </div>
</div>

<!-- ══ FAB ══ -->
<button class="fab" onclick="openQuickInput()">+</button>

<!-- ══ TOAST ══ -->
<div id="toast"></div>

<script src="app.js"></script>
</body>
</html>
