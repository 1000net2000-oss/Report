<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0f0f12">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content=" ">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <title>Отчёт о работе</title>
</head>
<body>

<!-- ══ MAIN PAGE ══ -->
<div class="page active" id="pageMain">

  <header>
    <div class="header-top">
      <div class="lang-switcher">
        <button class="flag-btn" id="flagRu" onclick="setLang('ru')">🏳️</button>
        <button class="flag-btn" id="flagPl" onclick="setLang('pl')">🇵🇱</button>
      </div>
      <div class="header-actions">
        <button id="btnStats" class="hdr-btn hdr-btn--icon hdr-btn--accent" onclick="openStats()" title="Статистика">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M18.7 8l-5.1 5.1-2.8-2.8L7 14"/></svg>
        </button>
        <button id="btnMore" class="hdr-btn hdr-btn--icon" onclick="toggleMoreMenu()" title="Ещё">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>
        </button>
        <div id="moreMenu" class="more-menu">
          <button id="btnBackup" class="more-menu-item" onclick="backupData()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
            <span>Бэкап</span>
          </button>
          <label id="btnRestore" class="more-menu-item">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
            <span id="btnRestoreLbl">Загрузить</span>
            <input type="file" accept=".json" onchange="restoreData(event)" class="sr-only">
          </label>
          <div class="more-menu-divider"></div>
          <button id="btnSummary" class="more-menu-item" onclick="copySummary()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
            <span>Поделиться</span>
          </button>
          <button id="btnArchive" class="more-menu-item" onclick="openArchive()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>
            <span>Архив</span>
          </button>
        </div>
      </div>
    </div>
    <div class="month-selector">
      <button class="month-btn" onclick="changeMonth(-1)">‹</button>
      <div class="month-center">
        <div class="month-label" id="monthLabel"></div>
        <div class="month-day-counter" id="monthDayCounter"></div>
      </div>
      <button class="month-btn" onclick="changeMonth(1)">›</button>
    </div>
  </header>

  <div class="stats-scroll">
    <div class="stat-chip stat-chip--total" onclick="setFilter('total')">
      <div class="stat-chip-label" id="labelTotal">Всего</div>
      <div class="stat-chip-val" id="totalAll">0</div>
    </div>
    <div class="stat-chip stat-chip--mob" onclick="setFilter('mob')">
      <div class="stat-chip-label" id="labelMob">Моб</div>
      <div class="stat-chip-val" id="totalMob">0</div>
    </div>
    <div class="stat-chip stat-chip--distr stat-chip--sklad" onclick="toggleSkladChip(this)">
      <div class="stat-chip-label">Склад</div>
      <div class="stat-chip-val" id="totalSkladNew">0</div>
      <div class="sklad-chip-details" id="skladChipDetails">
        <div class="sklad-chip-row">
          <span class="sklad-chip-lbl sklad-chip-lbl--dist">Д забрал</span>
          <span class="sklad-chip-num" id="chip_tookDist">0</span>
        </div>
        <div class="sklad-chip-row">
          <span class="sklad-chip-lbl sklad-chip-lbl--dist">Д отдал</span>
          <span class="sklad-chip-num" id="chip_gaveDist">0</span>
        </div>
        <div class="sklad-chip-row">
          <span class="sklad-chip-lbl sklad-chip-lbl--mb">МБ забрал</span>
          <span class="sklad-chip-num" id="chip_tookMb">0</span>
        </div>
        <div class="sklad-chip-row">
          <span class="sklad-chip-lbl sklad-chip-lbl--mb">МБ отдал</span>
          <span class="sklad-chip-num" id="chip_gaveMb">0</span>
        </div>
      </div>
    </div>
    <button class="stat-chip stat-chip--work" onclick="openHistory('work')">
      <div class="stat-chip-label" id="labelOtherWork">Работы</div>
      <div class="stat-chip-val-wrap">
        <span class="stat-chip-val" id="totalExtraWork">0</span>
        <span class="stat-chip-sub stat-tile-dot">·</span>
        <span class="stat-chip-sub" id="totalExtraWorkTime"></span>
      </div>
    </button>
    <div class="stat-chip stat-chip--prok" onclick="setFilter('prok')">
      <div class="stat-chip-label" id="labelProk">Прок</div>
      <div class="stat-chip-val" id="totalProk">0</div>
    </div>
    <div class="stat-chip stat-chip--inst" onclick="setFilter('inst')">
      <div class="stat-chip-label">Инсталляция</div>
      <div class="stat-chip-val" id="totalInst">0</div>
    </div>
    <div class="stat-chip stat-chip--missed" onclick="setFilter('missed')">
      <div class="stat-chip-label">Мимо</div>
      <div class="stat-chip-val" id="totalMissed">0</div>
    </div>
    <button class="stat-chip stat-chip--travel" onclick="openHistory('travel')">
      <div class="stat-chip-label" id="labelTravel">В пути</div>
      <div class="stat-chip-val" id="totalExtraTravel">0</div>
    </button>
  </div>

  <div class="stats-warehouse-compact">
    <div class="swc-tile swc-tile--warehouse">
      <span class="swc-label" id="labelWarehouse">Склад</span>
      <span class="swc-val" id="totalSkladDays">0</span>
      <span class="swc-days" id="labelWarehouseDays">дней</span>
    </div>
    <div class="swc-tile swc-tile--highway">
      <span class="swc-label" id="labelHighway">Трасса</span>
      <span class="swc-val" id="totalTrassaDays">0</span>
      <span class="swc-days" id="labelHighwayDays">дней</span>
    </div>
  </div>

  <div class="stat-salary" onclick="toggleSalary()">
    <div class="salary-val"><span id="salaryNum" class="salary-hidden">—</span></div>
  </div>

  <div class="week-list" id="daysList"></div>
  <div class="day-detail-panel" id="dayDetailPanel">
    <div class="day-detail-header">
      <div>
        <div class="day-detail-date" id="detailDate"></div>
        <div class="day-detail-wd" id="detailWd"></div>
      </div>
      <div class="day-detail-totals" id="detailTotals"></div>
      <button class="day-detail-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="day-detail-body" id="detailBody"></div>
  </div>
  <div class="sklad-panel" id="skladPanel"></div>

</div>
<div class="page" id="pageHistory">
  <div class="hist-header">
    <button class="back-btn" onclick="openMain()">←</button>
    <div class="hist-title hist-title--orange" id="histTitle">История</div>
  </div>
  <div class="hist-tabs">
    <button class="hist-tab on" id="tabWork" onclick="switchTab('work')">📋 Другие работы</button>
    <button class="hist-tab" id="tabTravel" onclick="switchTab('travel')">🚗 В пути</button>
  </div>
  <div class="hist-content" id="histContent"></div>
</div>

<!-- ══ STATS PAGE ══ -->
<div class="page" id="pageStats">
  <div class="stats-page-header">
    <button class="back-btn" onclick="closeStats()">←</button>
    <div>
      <div class="stats-page-title">Статистика</div>
      <div class="stats-page-sub" id="statsMonthLabel"></div>
    </div>
  </div>
  <div class="stats-page-content" id="statsContent"></div>
</div>

<!-- ══ ARCHIVE PAGE ══ -->
<div class="page" id="pageArchive">
  <div class="hist-header">
    <button class="back-btn" onclick="closeArchive()">←</button>
    <div class="hist-title hist-title--accent" id="archiveTitle">Архив</div>
  </div>
  <div class="hist-content" id="archiveContent"></div>
</div>

<!-- ══ TOAST ══ -->
<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="app.js"></script>
</body>
</html>
